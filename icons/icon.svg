<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#0374B5"/>
  <circle cx="64" cy="64" r="56" fill="#0589D0"/>

  <!-- Document / page shape -->
  <rect x="38" y="28" width="52" height="64" rx="4" fill="white" opacity="0.95"/>
  <rect x="38" y="28" width="52" height="64" rx="4" fill="none" stroke="white" stroke-width="1"/>

  <!-- Lines on document -->
  <rect x="48" y="40" width="32" height="3" rx="1.5" fill="#0374B5" opacity="0.3"/>
  <rect x="48" y="48" width="24" height="3" rx="1.5" fill="#0374B5" opacity="0.3"/>
  <rect x="48" y="56" width="28" height="3" rx="1.5" fill="#0374B5" opacity="0.3"/>
  <rect x="48" y="64" width="20" height="3" rx="1.5" fill="#0374B5" opacity="0.3"/>

  <!-- Download arrow -->
  <g transform="translate(64, 88)">
    <rect x="-3" y="-20" width="6" height="16" rx="2" fill="white"/>
    <polygon points="-10,0 0,12 10,0" fill="white"/>
    <!-- Base line -->
    <rect x="-14" y="14" width="28" height="3" rx="1.5" fill="white"/>
  </g>
</svg>
