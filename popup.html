<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas Course Downloader</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #2d3b45;
    }
    #status {
      font-size: 13px;
      margin-bottom: 4px;
      color: #555;
    }
    .success { color: #1a7f37; font-weight: 600; }
    .error   { color: #cf222e; }
    button {
      width: 100%;
      padding: 10px;
      background-color: #0374B5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover { background-color: #025a8e; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <h2>Canvas Course Downloader</h2>
  <div id="status">Checking page...</div>
  <button id="downloadBtn" disabled>Download Course Content</button>
  <script src="popup.js"></script>
</body>
</html>
